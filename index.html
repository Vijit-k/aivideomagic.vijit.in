<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Video Magic | Pro</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        :root { --bg: #050505; --card: #121212; --blue: #3d91ff; --green: #00c853; --border: #282828; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 50px 20px; }
        .glass-container { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .credit-badge { background: rgba(61, 145, 255, 0.1); color: var(--blue); border: 1px solid var(--blue); padding: 5px 15px; border-radius: 30px; font-weight: bold; }
        h1 { font-size: 24px; margin-bottom: 30px; background: linear-gradient(to right, #3d91ff, #913dff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input, button { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid var(--border); background: #1a1a1a; color: #fff; font-size: 16px; }
        .btn-generate { background: var(--green); border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,200,83,0.3); }
        .pricing-section { display: flex; gap: 15px; margin-top: 20px; }
        .price-card { flex: 1; background: #1a1a1a; border: 1px solid var(--border); padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; }
        .price-card:hover { border-color: var(--blue); }
    </style>
</head>
<body>

<div class="glass-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>AI Video Magic</h1>
        <div id="badge" class="credit-badge">CREDITS: 0</div>
    </div>

    <input type="email" id="email" placeholder="Your account email" oninput="fetchCredits()">
    <input type="file" id="imageInput" accept="image/*">
    <button class="btn-generate" onclick="generateVideo()">GENERATE VIDEO</button>
    
    <div id="status" style="text-align: center; font-size: 14px;"></div>

    <div class="pricing-section">
        <div class="price-card" onclick="startPay(500, 50)">
            <div style="color: var(--blue); font-weight: bold;">Starter</div>
            <div style="font-size: 20px; margin: 10px 0;">₹500</div>
            <div style="font-size: 12px; color: #888;">50 Credits</div>
        </div>
        <div class="price-card" onclick="startPay(1000, 125)">
            <div style="color: var(--blue); font-weight: bold;">Pro</div>
            <div style="font-size: 20px; margin: 10px 0;">₹1000</div>
            <div style="font-size: 12px; color: #888;">125 Credits</div>
        </div>
    </div>
</div>

<script>
    const WORKER = "https://stability-bridge.vijitkumar.workers.dev";

    async function fetchCredits() {
        const email = document.getElementById('email').value.trim().toLowerCase();
        if(!email.includes('@')) return;
        const res = await fetch(`${WORKER}?email=${email}`);
        const data = await res.json();
        document.getElementById('badge').innerText = `CREDITS: ${data.total_credits || 0}`;
    }

    async function generateVideo() {
        const email = document.getElementById('email').value;
        const file = document.getElementById('imageInput').files[0];
        const status = document.getElementById('status');
        if(!file || !email) return alert("Email and image required");

        status.innerText = "Processing... Please wait.";
        status.style.color = "#3d91ff";

        const fd = new FormData();
        fd.append("image", file);
        fd.append("email", email);

        try {
            const res = await fetch(WORKER, { method: "POST", body: fd });
            const result = await res.json();
            if(!res.ok) throw new Error(result.error);
            status.innerHTML = `<span style="color: #00c853">Success! ID: ${result.id}</span>`;
        } catch (e) {
            status.innerHTML = `<span style="color: #ff5252">Error: ${e.message}</span>`;
        }
    }

    function startPay(amt, creds) {
        // Razorpay logic here
    }
</script>
</body>
</html>
