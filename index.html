<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Magic</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --green: #238636; --border: #30363d; }
        body { font-family: sans-serif; background: var(--bg); color: #c9d1d9; display: flex; justify-content: center; padding: 40px 20px; }
        .container { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); width: 440px; }
        .badge { background: #1f6feb; color: white; padding: 5px 12px; border-radius: 20px; float: right; font-weight: bold; font-size: 0.85rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0d1117; border: 1px solid var(--border); color: white; box-sizing: border-box; border-radius: 6px; }
        button { width: 100%; padding: 15px; background: var(--green); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { margin-top: 15px; text-align: center; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="badge" class="badge">CREDITS: --</div>
    <h2 style="color: var(--blue);">AI Video Magic</h2>

    <label>Email Address</label>
    <input type="email" id="email" placeholder="your@email.com" oninput="fetchCredits()">

    <label>Upload Image</label>
    <input type="file" id="imageInput" accept="image/*">
    <p style="font-size: 0.75rem; color: #8b949e;">Image will be auto-resized to meet Stability AI's requirements.</p>

    <button id="genBtn" onclick="startGeneration()">Generate Video</button>
    <div id="status"></div>
</div>

<script>
    const WORKER_URL = "https://stability-bridge.vijitkumar.workers.dev"; // Your worker URL

    async function fetchCredits() {
        const email = document.getElementById('email').value.trim().toLowerCase();
        if (!email.includes('@')) return;
        try {
            const res = await fetch(`${WORKER_URL}?email=${email}`);
            const data = await res.json();
            document.getElementById('badge').innerText = `CREDITS: ${data.total_credits ?? 0}`;
        } catch (e) { document.getElementById('badge').innerText = "CREDITS: Error"; }
    }

    async function autoResize(file) {
        return new Promise((resolve) => {
            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                // Stability requires dimensions to be multiples of 64
                canvas.width = Math.round(img.width / 64) * 64;
                canvas.height = Math.round(img.height / 64) * 64;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                canvas.toBlob((blob) => resolve(blob), 'image/png');
            };
        });
    }

    async function startGeneration() {
        const email = document.getElementById('email').value.trim().toLowerCase();
        const file = document.getElementById('imageInput').files[0];
        const status = document.getElementById('status');
        const btn = document.getElementById('genBtn');
        
        if (!file || !email) return alert("Email and Image are required.");

        btn.disabled = true;
        status.style.color = "var(--blue)";
        status.innerText = "Step 1/2: Optimizing Image Dimensions...";
        
        try {
            const optimizedImage = await autoResize(file);

            status.innerText = "Step 2/2: Sending to Stability AI...";
            const fd = new FormData();
            fd.append("image", optimizedImage);
            // We append email for the Worker to verify later, but the Worker will strip it
            fd.append("email", email); 

            const res = await fetch(WORKER_URL, { method: "POST", body: fd });
            const result = await res.json();
            
            if (!res.ok) throw new Error(result.error || "Stability Rejected Request");
            
            status.style.color = "var(--green)";
            status.innerHTML = `<b>SUCCESS!</b> Video ID: ${result.id}<br><span style="font-size:0.8rem; color:#8b949e">Check your Stability dashboard!</span>`;
        } catch (err) {
            status.style.color = "red";
            status.innerText = "Error: " + err.message;
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
