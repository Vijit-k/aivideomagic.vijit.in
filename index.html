<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Magic - Nuantra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' ..'; } 60% { content: ' ...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center py-10 px-4">

    <div class="w-full max-w-md flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold text-blue-400 underline decoration-emerald-500">AI Video Magic</h1>
        <div id="creditBadge" class="bg-blue-600 px-4 py-1 rounded-full text-sm font-bold">CREDITS: 20</div>
    </div>

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="mb-5">
            <label class="block text-xs font-bold mb-2 text-slate-400 uppercase tracking-widest">Account Email</label>
            <input type="email" id="userEmail" value="vijitkumar@gmail.com" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div class="mb-5">
            <label class="block text-xs font-bold mb-2 text-slate-400 uppercase tracking-widest">1. Upload Image</label>
            <input type="file" id="imageInput" accept="image/*" class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white cursor-pointer">
        </div>

        <div class="mb-6">
            <label class="block text-xs font-bold mb-2 text-slate-400 uppercase tracking-widest">2. Motion Instructions</label>
            <textarea id="motionPrompt" rows="2" placeholder="Describe the motion (e.g. mascot waves hello)..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none text-sm"></textarea>
        </div>

        <button id="generateBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl transition-all disabled:opacity-50">Generate Video</button>

        <div id="status" class="mt-6 text-center text-blue-300 hidden">
            <span class="loading-dots font-medium text-lg">Processing Magic</span>
            <p class="text-[10px] text-slate-500 mt-2 uppercase tracking-tighter">Stability AI is animating your mascot...</p>
        </div>

        <div id="videoContainer" class="mt-6 hidden">
            <video id="outputVideo" controls class="w-full rounded-lg border-2 border-emerald-500 shadow-lg"></video>
            <a id="downloadBtn" download="nuantra-magic.mp4" class="block text-center mt-4 text-emerald-400 underline font-bold">Download Your Video</a>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://stability-bridge.vijitkumar.workers.dev";
        const genBtn = document.getElementById('generateBtn');
        const statusDiv = document.getElementById('status');
        const videoContainer = document.getElementById('videoContainer');

        async function updateCredits() {
            const email = document.getElementById('userEmail').value;
            try {
                const res = await fetch(`${WORKER_URL}/?email=${email}`);
                const data = await res.json();
                if(data[0]) document.getElementById('creditBadge').innerText = `CREDITS: ${data[0].total_credits}`;
            } catch (e) { console.error("Credit fetch failed"); }
        }
        updateCredits();

        genBtn.addEventListener('click', async () => {
            const email = document.getElementById('userEmail').value;
            const imageFile = document.getElementById('imageInput').files[0];
            const motionText = document.getElementById('motionPrompt').value;

            if (!imageFile) return alert("Please upload your mascot image!");

            genBtn.disabled = true;
            statusDiv.classList.remove('hidden');
            videoContainer.classList.add('hidden');

            try {
                const formData = new FormData();
                formData.append('email', email);
                formData.append('image', imageFile);
                formData.append('prompt', motionText); 

                const res = await fetch(WORKER_URL, { method: 'POST', body: formData });
                const initData = await res.json();

                if (initData.id) { pollForResult(initData.id); } 
                else { throw new Error(initData.error || "Generation Failed"); }
            } catch (err) {
                alert("Error: " + err.message);
                genBtn.disabled = false;
                statusDiv.classList.add('hidden');
            }
        });

        async function pollForResult(id) {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`${WORKER_URL}/result?id=${id}`);
                    if (res.status === 200) {
                        const blob = await res.blob();
                        const videoUrl = URL.createObjectURL(blob);
                        document.getElementById('outputVideo').src = videoUrl;
                        document.getElementById('downloadBtn').href = videoUrl;
                        clearInterval(interval);
                        statusDiv.classList.add('hidden');
                        videoContainer.classList.remove('hidden');
                        genBtn.disabled = false;
                        updateCredits();
                    } else if (res.status !== 202) {
                        clearInterval(interval);
                        alert("Video failed to process.");
                    }
                } catch (e) { console.error("Polling...", e); }
            }, 10000);
        }
    </script>
</body>
</html>
