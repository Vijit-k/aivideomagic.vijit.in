<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Magic - Nuantra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' ..'; } 60% { content: ' ...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center py-10 px-4">

    <div class="w-full max-w-md flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold text-blue-400">AI Video Magic</h1>
        <div id="creditBadge" class="bg-blue-600 px-4 py-1 rounded-full text-sm font-bold underline underline-offset-4">
            CREDITS: --
        </div>
    </div>

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="mb-6">
            <label class="block text-sm font-medium mb-2 text-slate-400">ACCOUNT EMAIL</label>
            <input type="email" id="userEmail" value="vijitkumar@gmail.com" 
                   class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium mb-2 text-slate-400">UPLOAD STARTING IMAGE</label>
            <input type="file" id="imageInput" accept="image/*" 
                   class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
        </div>

        <button id="generateBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl transition-all disabled:opacity-50">
            Generate Video
        </button>

        <div id="status" class="mt-6 text-center text-blue-300 hidden">
            <span class="loading-dots font-medium">Processing Magic</span>
            <p class="text-xs text-slate-500 mt-2 italic">Video takes about 60-120 seconds. Please don't close this page.</p>
        </div>

        <div id="videoContainer" class="mt-6 hidden">
            <video id="outputVideo" controls class="w-full rounded-lg border-2 border-emerald-500"></video>
            <a id="downloadBtn" download="magic-video.mp4" class="block text-center mt-4 text-emerald-400 underline font-medium">Download Video</a>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://stability-bridge.vijitkumar.workers.dev"; //
        const genBtn = document.getElementById('generateBtn');
        const statusDiv = document.getElementById('status');
        const videoContainer = document.getElementById('videoContainer');

        // Fetch Credits on Load
        async function updateCredits() {
            const email = document.getElementById('userEmail').value;
            try {
                const res = await fetch(`${WORKER_URL}/?email=${email}`);
                const data = await res.json();
                document.getElementById('creditBadge').innerText = `CREDITS: ${data[0].total_credits}`; //
            } catch (e) { console.error("Credit fetch failed"); }
        }
        updateCredits();

        genBtn.addEventListener('click', async () => {
            const email = document.getElementById('userEmail').value;
            const imageFile = document.getElementById('imageInput').files[0];

            if (!imageFile) return alert("Please upload an image first!");

            genBtn.disabled = true;
            statusDiv.classList.remove('hidden');
            videoContainer.classList.add('hidden');

            try {
                // 1. Start the Generation
                const formData = new FormData();
                formData.append('email', email);
                formData.append('image', imageFile);

                const res = await fetch(WORKER_URL, { method: 'POST', body: formData });
                const initData = await res.json();

                if (initData.id) {
                    // 2. Poll for the result every 10 seconds
                    pollForResult(initData.id);
                } else {
                    throw new Error(initData.error || "Failed to start");
                }
            } catch (err) {
                alert("Error: " + err.message);
                genBtn.disabled = false;
                statusDiv.classList.add('hidden');
            }
        });

        async function pollForResult(generationId) {
            const interval = setInterval(async () => {
                try {
                    // We call the worker with a result-checking parameter
                    const res = await fetch(`${WORKER_URL}/result?id=${generationId}`);
                    
                    if (res.status === 200) {
                        const blob = await res.blob();
                        const videoUrl = URL.createObjectURL(blob);
                        
                        document.getElementById('outputVideo').src = videoUrl;
                        document.getElementById('downloadBtn').href = videoUrl;
                        
                        clearInterval(interval);
                        statusDiv.classList.add('hidden');
                        videoContainer.classList.remove('hidden');
                        genBtn.disabled = false;
                        updateCredits(); // Sync the 20 -> 19 drop
                    } else if (res.status !== 202) {
                        // 202 means "still processing"
                        clearInterval(interval);
                        alert("Video generation failed.");
                    }
                } catch (e) { console.error("Polling error", e); }
            }, 10000); // Check every 10 seconds
        }
    </script>
</body>
</html>
