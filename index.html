<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Magic | Nuantra</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --green: #238636; --red: #da3633; --border: #30363d; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: #c9d1d9; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .container { background: var(--card); padding: 32px; border-radius: 16px; width: 100%; max-width: 480px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); border: 1px solid var(--border); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
        h2 { color: var(--blue); margin: 0; font-size: 1.5rem; letter-spacing: -0.5px; }
        .badge { background: #1f6feb; color: white; padding: 8px 16px; border-radius: 30px; font-weight: 800; font-size: 0.85rem; box-shadow: 0 4px 12px rgba(31, 111, 235, 0.3); }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #8b949e; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }
        input, textarea { width: 100%; padding: 14px; background: #0d1117; border: 1px solid var(--border); border-radius: 8px; color: white; font-size: 0.95rem; box-sizing: border-box; transition: border-color 0.2s; }
        input:focus { border-color: var(--blue); outline: none; }
        button { width: 100%; padding: 16px; background: var(--green); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: transform 0.1s, background 0.2s; margin-top: 10px; }
        button:hover { background: #2ea043; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; transform: none; }
        #status { margin-top: 24px; text-align: center; font-size: 0.9rem; min-height: 20px; color: #8b949e; }
        .debug-area { margin-top: 20px; padding: 12px; background: #010409; border-radius: 6px; font-family: monospace; font-size: 0.7rem; color: #f0f6fc; border: 1px dashed #30363d; display: none; overflow-x: auto; }
        .error-box { color: var(--red); background: rgba(218, 54, 51, 0.1); border: 1px solid var(--red); padding: 12px; border-radius: 8px; font-size: 0.85rem; margin-top: 15px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>AI Video Magic</h2>
        <div id="badge" class="badge">CREDITS: --</div>
    </div>

    <div class="input-group">
        <label>Verify Account Email</label>
        <input type="email" id="email" placeholder="vijitkumar@gmail.com" oninput="debounceFetch()">
    </div>

    <div class="input-group">
        <label>1. Upload Image (Multiples of 64)</label>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div class="input-group">
        <label>2. Motion Prompt</label>
        <textarea id="prompt" rows="2" placeholder="Describe the movement..."></textarea>
    </div>

    <button id="genBtn" onclick="startGeneration()">Generate Animation</button>

    <div id="status"></div>
    <div id="debug" class="debug-area"></div>
</div>

<script>
    const WORKER_URL = "https://your-worker-name.workers.dev"; // UPDATE THIS
    let fetchTimer;

    function debounceFetch() {
        clearTimeout(fetchTimer);
        fetchTimer = setTimeout(fetchCredits, 500);
    }

    async function fetchCredits() {
        const email = document.getElementById('email').value.trim();
        const badge = document.getElementById('badge');
        const debug = document.getElementById('debug');
        
        if (!email.includes('@')) return;

        try {
            const res = await fetch(`${WORKER_URL}?email=${encodeURIComponent(email)}`);
            const data = await res.json();
            
            // DEEP FIX: Supabase returns an array. We must access the first element
            const record = Array.isArray(data) ? data[0] : data;
            const balance = (record && record.total_credits !== undefined) ? record.total_credits : 0;
            
            badge.innerText = `CREDITS: ${balance}`;
            debug.style.display = "block";
            debug.innerText = `Server Response: ${JSON.stringify(data)}`;
        } catch (err) {
            badge.innerText = "CREDITS: 0";
            debug.innerText = `Fetch Error: ${err.message}`;
        }
    }

    async function startGeneration() {
        const email = document.getElementById('email').value;
        const imageFile = document.getElementById('imageInput').files[0];
        const status = document.getElementById('status');
        const btn = document.getElementById('genBtn');

        if (!email || !imageFile) return alert("Please fill in all fields.");

        // PRE-FLIGHT CHECK: Avoid "Stability Refused" by checking dimensions
        const img = new Image();
        img.src = URL.createObjectURL(imageFile);
        img.onload = async () => {
            if (img.width % 64 !== 0 || img.height % 64 !== 0) {
                status.innerHTML = `<div class="error-box"><b>Invalid Size:</b> Your image is ${img.width}x${img.height}. Both width and height must be multiples of 64 (e.g., 768x768).</div>`;
                return;
            }
            
            btn.disabled = true;
            status.innerHTML = "<b>Step 1/2:</b> Authorizing with Database...";

            const fd = new FormData();
            fd.append("email", email);
            fd.append("image", imageFile);

            try {
                const res = await fetch(WORKER_URL, { method: "POST", body: fd });
                const result = await res.json();

                if (!res.ok) throw new Error(result.error + (result.details ? ": " + result.details : ""));

                status.innerHTML = "<b>Step 2/2:</b> Stability AI is animating... (60-90s)";
                pollForResult(result.id);
            } catch (err) {
                status.innerHTML = `<div class="error-box"><b>Error:</b> ${err.message}</div>`;
                btn.disabled = false;
            }
        };
    }

    async function pollForResult(id) {
        const status = document.getElementById('status');
        const interval = setInterval(async () => {
            const res = await fetch(`${WORKER_URL}/result?id=${id}`);
            if (res.status === 202) return;

            if (res.ok) {
                clearInterval(interval);
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                status.innerHTML = `<video controls width="100%" style="border-radius:12px;"><source src="${url}"></video><br><a href="${url}" download="magic.mp4" style="color:var(--blue); text-decoration:none; font-size:0.8rem;">Download Video</a>`;
                document.getElementById('genBtn').disabled = false;
                fetchCredits();
            }
        }, 10000);
    }
</script>
</body>
</html>
