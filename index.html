<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>AI Video Magic</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --green: #238636; --border: #30363d; }
        body { font-family: sans-serif; background: var(--bg); color: #c9d1d9; display: flex; justify-content: center; padding-top: 50px; }
        .container { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); width: 440px; }
        .badge { background: #1f6feb; color: white; padding: 4px 12px; border-radius: 15px; float: right; font-size: 0.8rem; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #0d1117; border: 1px solid var(--border); color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--green); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="badge" class="badge">CREDITS: --</div>
    <h2 style="color: var(--blue);">AI Video Magic</h2>

    <label>Email</label>
    <input type="email" id="email" placeholder="your@email.com" oninput="fetchCredits()">

    <label>1. Upload Image</label>
    <input type="file" id="imageInput" accept="image/*">
    <p style="font-size: 0.7rem; color: #8b949e; margin-top: -5px;">Any size allowed - we auto-resize for you.</p>

    <label>2. Motion Instructions</label>
    <textarea id="prompt" rows="3" placeholder="e.g. Cinematic slow zoom into the mascot"></textarea>

    <button id="genBtn" onclick="startGeneration()">Generate Video</button>
    <div id="status" style="margin-top: 15px; font-size: 0.9rem; text-align: center; color: #8b949e;"></div>
</div>

<script>
    const WORKER_URL = "https://stability-bridge.vijitkumar.workers.dev"; //

    async function fetchCredits() {
        const email = document.getElementById('email').value.trim().toLowerCase();
        if (!email.includes('@')) return;
        try {
            const res = await fetch(`${WORKER_URL}?email=${email}`);
            const data = await res.json();
            // Shows your 20 credits from the DB
            document.getElementById('badge').innerText = `CREDITS: ${data.total_credits ?? 0}`;
        } catch (e) { document.getElementById('badge').innerText = "CREDITS: Error"; }
    }

    // Solves the "multiples of 64" restriction for customers
    async function autoResize(file) {
        return new Promise((resolve) => {
            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = Math.round(img.width / 64) * 64;
                canvas.height = Math.round(img.height / 64) * 64;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                canvas.toBlob((blob) => resolve(blob), 'image/png');
            };
        });
    }

    async function startGeneration() {
        const email = document.getElementById('email').value.trim().toLowerCase();
        const file = document.getElementById('imageInput').files[0];
        const status = document.getElementById('status');
        if (!file || !email) return alert("Email and Image required");

        status.innerText = "Optimizing Image Dimensions...";
        const optimizedImage = await autoResize(file);

        status.innerText = "Connecting to Stability AI...";
        const fd = new FormData();
        fd.append("image", optimizedImage);
        fd.append("email", email);
        fd.append("prompt", document.getElementById('prompt').value);

        try {
            const res = await fetch(WORKER_URL, { method: "POST", body: fd });
            const result = await res.json();
            if (!res.ok) throw new Error(result.error || "Check Console");
            status.innerHTML = `<span style="color:var(--blue)">Video ID: ${result.id}<br>Processing... check back in 60s.</span>`;
        } catch (err) {
            status.innerHTML = `<span style="color:red">Error: ${err.message}</span>`;
        }
    }
</script>
</body>
</html>
