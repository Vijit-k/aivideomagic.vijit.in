<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Magic | Vijit</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --green: #238636; --border: #30363d; }
        body { font-family: sans-serif; background: var(--bg); color: #c9d1d9; display: flex; justify-content: center; padding: 40px 20px; }
        .container { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 450px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { color: var(--blue); margin: 0; font-size: 1.5rem; }
        .badge { background: #1f6feb; color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: #8b949e; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--green); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #status { margin-top: 15px; text-align: center; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>AI Video Magic</h2>
        <div id="badge" class="badge">CREDITS: --</div>
    </div>

    <div class="input-group">
        <label>Account Email</label>
        <input type="email" id="email" placeholder="yourname@gmail.com" oninput="fetchCredits()">
    </div>

    <div class="input-group">
        <label>1. Upload Image</label>
        <input type="file" id="imageInput" accept="image/*">
        <p style="font-size: 0.7rem; color: #8b949e;">Any size allowed - we auto-resize for you.</p>
    </div>

    <div class="input-group">
        <label>2. Motion Instructions</label>
        <textarea id="prompt" rows="3" placeholder="e.g., mascot blinks and smiles"></textarea>
    </div>

    <button id="genBtn" onclick="processMagic()">Generate Video</button>
    <div id="status"></div>
</div>

<script>
    const WORKER_URL = "https://stability-bridge.vijitkumar.workers.dev";

    async function fetchCredits() {
        const email = document.getElementById('email').value.trim().toLowerCase();
        if (!email.includes('@')) return;
        try {
            const res = await fetch(`${WORKER_URL}?email=${email}`);
            const data = await res.json();
            document.getElementById('badge').innerText = `CREDITS: ${data.total_credits ?? 0}`;
        } catch (e) { document.getElementById('badge').innerText = "CREDITS: Error"; }
    }

    async function smartResize(file) {
        return new Promise((resolve) => {
            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = Math.round(img.width / 64) * 64;
                canvas.height = Math.round(img.height / 64) * 64;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                canvas.toBlob((blob) => resolve(blob), 'image/png');
            };
        });
    }

    async function processMagic() {
        const email = document.getElementById('email').value.trim().toLowerCase();
        const file = document.getElementById('imageInput').files[0];
        const status = document.getElementById('status');
        const btn = document.getElementById('genBtn');

        if (!email || !file) return alert("Email and Image required");

        btn.disabled = true;
        status.style.color = "var(--blue)";
        status.innerText = "Optimizing Image...";

        try {
            const optimizedBlob = await smartResize(file);
            status.innerText = "Sending to Stability AI...";

            const fd = new FormData();
            fd.append("image", optimizedBlob);
            fd.append("prompt", document.getElementById('prompt').value);
            // We append email to send to the Worker, but the Worker will strip it before Stability
            fd.append("email", email);

            const res = await fetch(WORKER_URL, { method: "POST", body: fd });
            const result = await res.json();

            if (!res.ok) throw new Error(result.error || "Handshake Failed");

            status.style.color = "var(--green)";
            status.innerHTML = `Success! Video ID: ${result.id}<br><span style="font-size:0.8rem; color:#8b949e">Rendering takes ~60s</span>`;
        } catch (err) {
            status.style.color = "red";
            status.innerText = "Error: " + err.message;
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
