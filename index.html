<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Magic | vijit.in</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --primary: #3b82f6; --success: #10b981; --india: #0ca678; --global: #7950f2; --text: #f1f5f9; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .pay-area { display: flex; gap: 15px; margin-bottom: 30px; width: 100%; max-width: 650px; justify-content: center; flex-wrap: wrap; }
        .pay-btn { padding: 14px 24px; border-radius: 8px; border: none; color: white; font-weight: 800; cursor: pointer; text-decoration: none; font-size: 14px; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .pay-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-in { background: var(--india); }
        .btn-gl { background: var(--global); }
        .container { width: 100%; max-width: 420px; background: var(--card); padding: 30px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .badge { background: var(--primary); padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
        input, textarea { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: border 0.2s; }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; }
        .gen-btn { width: 100%; padding: 16px; background: var(--success); border: none; color: white; font-weight: 700; cursor: pointer; border-radius: 8px; font-size: 15px; margin-top: 10px; }
        .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 13px; text-align: center; color: #94a3b8; }
    </style>
</head>
<body>

<div class="pay-area">
    <a href="https://rzp.io/rzp/KFhv4U4" target="_blank" class="pay-btn btn-in">Buy 11 Credits (India - ₹249)</a>
    <a href="https://rzp.io/rzp/Ug8Fhpx" target="_blank" class="pay-btn btn-gl">Buy 11 Credits (Global - $5)</a>
</div>

<div class="container">
    <div class="header">
        <h2 style="margin:0; font-size:20px;">AI Video Magic</h2>
        <div id="cDisp" class="badge">SYNCING...</div>
    </div>
    <div class="input-group">
        <label>Account Email</label>
        <input type="email" id="email" value="vijitkumar@gmail.com" oninput="debounceSync()">
    </div>
    <div class="input-group">
        <label>Video Motion Description</label>
        <textarea id="prompt" rows="3" placeholder="Describe the motion..."></textarea>
    </div>
    <button id="genBtn" class="gen-btn" onclick="generateVideo()">Generate Video</button>
    <div id="status">System Ready</div>
</div>

<script>
    const WORKER_URL = "https://stability-bridge.vijitkumar.workers.dev/";
    let syncTimer;

    async function updateUI() {
        const email = document.getElementById('email').value.trim();
        const badge = document.getElementById('cDisp');
        const btn = document.getElementById('genBtn');
        const status = document.getElementById('status');
        if (!email) return;
        try {
            const res = await fetch(`${WORKER_URL}?email=${email}`);
            const data = await res.json();
            if (data && data[0]) {
                badge.innerText = `Credits: ${data[0].total_credits}`;
                badge.style.background = "#3b82f6";
                btn.disabled = data[0].total_credits <= 0;
            } else {
                badge.innerText = "NO ACCOUNT";
                badge.style.background = "#ef4444";
                btn.disabled = true;
            }
        } catch (err) {
            badge.innerText = "OFFLINE";
            badge.style.background = "#ef4444";
        }
    }

    async function generateVideo() {
        const email = document.getElementById('email').value.trim();
        const prompt = document.getElementById('prompt').value.trim();
        const status = document.getElementById('status');
        const btn = document.getElementById('genBtn');
        if(!prompt) return alert("Please describe the motion first!");
        status.innerHTML = "🚀 <span style='color:#3b82f6'>Processing...</span>";
        btn.disabled = true;
        try {
            const res = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, prompt })
            });
            const out = await res.json();
            if (out.id) {
                status.innerHTML = "✅ <span style='color:#10b981'>Success! Check email soon.</span>";
                setTimeout(updateUI, 4000);
            }
        } catch (e) {
            status.innerText = "Connection Error.";
            btn.disabled = false;
        }
    }

    function debounceSync() {
        clearTimeout(syncTimer);
        syncTimer = setTimeout(updateUI, 600);
    }
    window.onload = updateUI;
</script>
</body>
</html>
