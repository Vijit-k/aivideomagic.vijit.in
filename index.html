<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Magic | Nuantra</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --green: #238636; --red: #da3633; --border: #30363d; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: #c9d1d9; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .container { background: var(--card); padding: 32px; border-radius: 16px; width: 100%; max-width: 480px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h2 { color: var(--blue); margin: 0; font-size: 1.4rem; }
        .badge { background: #1f6feb; color: white; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; }
        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.7rem; font-weight: 700; color: #8b949e; text-transform: uppercase; margin-bottom: 6px; }
        input, textarea { width: 100%; padding: 12px; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; color: white; font-size: 0.9rem; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--green); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: opacity 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { margin-top: 20px; text-align: center; font-size: 0.85rem; }
        .debug-panel { background: #010409; border: 1px dashed var(--border); padding: 10px; font-family: monospace; font-size: 0.7rem; color: #7ee787; margin-top: 15px; overflow-x: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>AI Video Magic</h2>
        <div id="badge" class="badge">CREDITS: --</div>
    </div>

    <div class="input-group">
        <label>Account Email</label>
        <input type="email" id="email" placeholder="yourname@gmail.com" oninput="debounceFetch()">
    </div>

    <div class="input-group">
        <label>1. Upload Image</label>
        <input type="file" id="imageInput" accept="image/*">
        <small style="font-size:0.65rem; color:#8b949e;">Any size allowed - we auto-resize for you.</small>
    </div>

    <div class="input-group">
        <label>2. Motion Instructions</label>
        <textarea id="prompt" rows="2" placeholder="e.g. Cinematic slow zoom into the mascot"></textarea>
    </div>

    <button id="genBtn" onclick="processMagic()">Generate Video</button>

    <div id="status"></div>
    <div id="debug" class="debug-panel" style="display:none;"></div>
</div>

<script>
    const WORKER_URL = "YOUR_CLOUDFLARE_WORKER_URL"; 
    let timer;

    function debounceFetch() {
        clearTimeout(timer);
        timer = setTimeout(fetchCredits, 600);
    }

    async function fetchCredits() {
        const email = document.getElementById('email').value.trim().toLowerCase();
        const badge = document.getElementById('badge');
        const debug = document.getElementById('debug');
        if (!email.includes('@')) return;

        try {
            const res = await fetch(`${WORKER_URL}?email=${encodeURIComponent(email)}`);
            const data = await res.json();
            debug.style.display = "block";
            debug.innerText = `DB Response: ${JSON.stringify(data)}`;

            // Standardize credit reading from Supabase
            const record = Array.isArray(data) ? data[0] : data;
            const balance = (record && record.total_credits !== undefined) ? record.total_credits : 0;
            badge.innerText = `CREDITS: ${balance}`;
        } catch (err) {
            badge.innerText = "CREDITS: Error";
            debug.innerText = `Fetch Error: ${err.message}`;
        }
    }

    // NEW: Auto-Resizer to solve "Stability Refused"
    async function smartResize(file) {
        return new Promise((resolve) => {
            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                // Snap to nearest multiple of 64
                canvas.width = Math.round(img.width / 64) * 64;
                canvas.height = Math.round(img.height / 64) * 64;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                canvas.toBlob((blob) => resolve(blob), 'image/png');
            };
        });
    }

    async function processMagic() {
        const email = document.getElementById('email').value.trim().toLowerCase();
        const imageFile = document.getElementById('imageInput').files[0];
        const status = document.getElementById('status');
        const btn = document.getElementById('genBtn');

        if (!email || !imageFile) return alert("Email and Image are required.");

        btn.disabled = true;
        status.innerHTML = "<b>Optimizing Image...</b>";

        try {
            // Resize image before sending
            const optimizedImage = await smartResize(imageFile);
            
            status.innerHTML = "<b>Step 1/2: Uploading...</b>";
            const fd = new FormData();
            fd.append("email", email);
            fd.append("image", optimizedImage);
            fd.append("prompt", document.getElementById('prompt').value);

            const res = await fetch(WORKER_URL, { method: "POST", body: fd });
            const result = await res.json();

            if (!res.ok) throw new Error(result.error || "Generation Failed");

            status.innerHTML = "<b>Step 2/2: Stability is animating... (60s)</b>";
            pollForResult(result.id);
        } catch (err) {
            status.innerHTML = `<span style="color:var(--red)">${err.message}</span>`;
            btn.disabled = false;
        }
    }

    async function pollForResult(id) {
        const status = document.getElementById('status');
        const interval = setInterval(async () => {
            const res = await fetch(`${WORKER_URL}/result?id=${id}`);
            if (res.status === 202) return;
            if (res.ok) {
                clearInterval(interval);
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                status.innerHTML = `<video controls width="100%" style="border-radius:8px;"><source src="${url}"></video>`;
                document.getElementById('genBtn').disabled = false;
                fetchCredits();
            }
        }, 10000);
    }
</script>
</body>
</html>
