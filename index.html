<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Magic | Nuantra</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --green: #238636; --red: #da3633; --border: #30363d; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: #c9d1d9; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .container { background: var(--card); padding: 32px; border-radius: 16px; width: 100%; max-width: 480px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h2 { color: var(--blue); margin: 0; font-size: 1.4rem; }
        .badge { background: #1f6feb; color: white; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; }
        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.7rem; font-weight: 700; color: #8b949e; text-transform: uppercase; margin-bottom: 6px; }
        input, textarea { width: 100%; padding: 12px; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; color: white; font-size: 0.9rem; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--green); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        #status { margin-top: 20px; }
        .error-msg { background: rgba(218, 54, 51, 0.1); border: 1px solid var(--red); color: #ff7b72; padding: 10px; border-radius: 6px; font-size: 0.85rem; margin-top: 10px; }
        .raw-debug { background: #010409; border: 1px dashed var(--border); padding: 10px; font-family: monospace; font-size: 0.75rem; color: #7ee787; margin-top: 15px; overflow-x: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>AI Video Magic</h2>
        <div id="badge" class="badge">CREDITS: --</div>
    </div>

    <div class="input-group">
        <label>Account Email</label>
        <input type="email" id="email" placeholder="yourname@gmail.com" oninput="debounceFetch()">
    </div>

    <div class="input-group">
        <label>1. Upload Image (Multiples of 64)</label>
        <input type="file" id="imageInput" accept="image/*">
        <small style="font-size:0.7rem; color:#8b949e;">Req: 768x768, 1024x576, etc.</small>
    </div>

    <div class="input-group">
        <label>2. Motion Instructions</label>
        <textarea id="prompt" rows="2" placeholder="e.g., mascot blinks and smiles"></textarea>
    </div>

    <button id="genBtn" onclick="processMagic()">Generate Video</button>

    <div id="status"></div>
    <div id="debugBox" class="raw-debug" style="display:none;"></div>
</div>

<script>
    // --- CHANGE THIS TO YOUR WORKER URL ---
    const WORKER_URL = "https://stability-bridge.vijitkumar.workers.dev/"; 
    
    let timer;

    // Fetches credits after you stop typing for 600ms
    function debounceFetch() {
        clearTimeout(timer);
        timer = setTimeout(fetchCredits, 600);
    }

    async function fetchCredits() {
        const email = document.getElementById('email').value.trim();
        const badge = document.getElementById('badge');
        const debugBox = document.getElementById('debugBox');
        
        if (!email.includes('@')) return;

        try {
            // Added a timestamp to prevent browser caching issues
            const res = await fetch(`${WORKER_URL}?email=${encodeURIComponent(email)}&t=${Date.now()}`);
            
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            
            const data = await res.json();
            
            // SHOW RAW DATA FOR DEBUGGING
            debugBox.style.display = "block";
            debugBox.innerText = `Raw Data: ${JSON.stringify(data)}`;

            // Handle both Array and Object responses from the Worker
            const record = Array.isArray(data) ? data[0] : data;
            const balance = (record && record.total_credits !== undefined) ? record.total_credits : 0;
            
            badge.innerText = `CREDITS: ${balance}`;
        } catch (err) {
            badge.innerText = "CREDITS: Error";
            debugBox.style.display = "block";
            debugBox.innerText = `Fetch Error: ${err.message}. Check Worker CORS settings.`;
        }
    }

    async function processMagic() {
        const email = document.getElementById('email').value.trim();
        const imageFile = document.getElementById('imageInput').files[0];
        const status = document.getElementById('status');
        const btn = document.getElementById('genBtn');

        if (!email || !imageFile) return alert("Please provide email and image.");

        // PRE-FLIGHT IMAGE CHECK
        const img = new Image();
        img.src = URL.createObjectURL(imageFile);
        img.onload = async () => {
            if (img.width % 64 !== 0 || img.height % 64 !== 0) {
                status.innerHTML = `<div class="error-msg"><b>Refused:</b> Image is ${img.width}x${img.height}. Both width and height must be multiples of 64 (e.g., 768x768).</div>`;
                return;
            }

            btn.disabled = true;
            status.innerHTML = "Processing Magic...";

            const fd = new FormData();
            fd.append("email", email);
            fd.append("image", imageFile);
            fd.append("prompt", document.getElementById('prompt').value);

            try {
                const res = await fetch(WORKER_URL, { method: "POST", body: fd });
                const result = await res.json();

                if (!res.ok) throw new Error(result.error || "Generation Failed");

                status.innerHTML = "Stability is animating... (this takes ~60s)";
                pollForResult(result.id);
            } catch (err) {
                status.innerHTML = `<div class="error-msg"><b>Error:</b> ${err.message}</div>`;
                btn.disabled = false;
            }
        };
    }

    async function pollForResult(id) {
        const status = document.getElementById('status');
        const interval = setInterval(async () => {
            const res = await fetch(`${WORKER_URL}/result?id=${id}`);
            if (res.status === 202) return; // Still working...

            if (res.ok) {
                clearInterval(interval);
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                status.innerHTML = `<video controls width="100%" style="border-radius:8px;"><source src="${url}"></video>`;
                document.getElementById('genBtn').disabled = false;
                fetchCredits(); // Update balance
            }
        }, 10000);
    }
</script>
</body>
</html>
