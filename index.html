<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Magic - Nuantra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 1rem; padding: 2rem; width: 100%; max-width: 28rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .input-box { width: 100%; background-color: #0f172a; border: 1px solid #334155; border-radius: 0.5rem; padding: 0.75rem; color: white; margin-bottom: 1.25rem; outline: none; }
        .btn { width: 100%; background-color: #059669; color: white; font-weight: bold; padding: 1rem; border-radius: 0.75rem; cursor: pointer; border: none; transition: background 0.2s; }
        .btn:hover { background-color: #047857; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .label { display: block; font-size: 0.75rem; font-weight: bold; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' ..'; } 60% { content: ' ...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <div class="w-full max-w-md flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold text-blue-400">AI Video Magic</h1>
        <div id="creditBadge" class="bg-blue-600 px-4 py-1 rounded-full text-sm font-bold">CREDITS: --</div>
    </div>

    <div class="card">
        <label class="label">Account Email</label>
        <input type="email" id="userEmail" value="vijitkumar@gmail.com" class="input-box">

        <label class="label">1. Upload Image</label>
        <p class="text-[10px] text-slate-500 mb-2 italic">Requires multiples of 64 (e.g., 768x768 or 1024x576)</p>
        <input type="file" id="imageInput" accept="image/*" class="w-full text-sm text-slate-400 mb-5 cursor-pointer">

        <label class="label">2. Motion Instructions</label>
        <textarea id="motionPrompt" rows="2" placeholder="e.g. Mascot blinks and smiles..." class="input-box text-sm"></textarea>

        <button id="generateBtn" class="btn">Generate Video</button>

        <div id="status" class="mt-6 text-center text-blue-300 hidden">
            <span class="loading-dots font-medium text-lg">Processing Magic</span>
            <p class="text-[10px] text-slate-500 mt-2 uppercase tracking-widest">Stability AI is animating your mascot...</p>
        </div>

        <div id="videoContainer" class="mt-6 hidden text-center">
            <video id="outputVideo" controls class="w-full rounded-lg border-2 border-emerald-500 mb-4"></video>
            <a id="downloadBtn" download="nuantra-video.mp4" class="text-emerald-400 underline font-bold">Download Video</a>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://stability-bridge.vijitkumar.workers.dev";
        const genBtn = document.getElementById('generateBtn');
        const statusDiv = document.getElementById('status');
        const videoContainer = document.getElementById('videoContainer');

        async function updateCredits() {
            const email = document.getElementById('userEmail').value;
            try {
                const res = await fetch(`${WORKER_URL}/?email=${email}`);
                const data = await res.json();
                if(data && data[0]) document.getElementById('creditBadge').innerText = `CREDITS: ${data[0].total_credits}`;
            } catch (e) { console.error("Credit fetch failed"); }
        }
        updateCredits();

        genBtn.addEventListener('click', async () => {
            const email = document.getElementById('userEmail').value;
            const imageFile = document.getElementById('imageInput').files[0];
            const motionText = document.getElementById('motionPrompt').value;

            if (!imageFile) return alert("Please upload an image!");

            // Local Validation
            const img = new Image();
            img.src = URL.createObjectURL(imageFile);
            await img.decode();
            if (img.width % 64 !== 0 || img.height % 64 !== 0) {
                return alert(`Dimensions must be multiples of 64. Current: ${img.width}x${img.height}. Try 768x768.`);
            }

            genBtn.disabled = true;
            statusDiv.classList.remove('hidden');
            videoContainer.classList.add('hidden');

            try {
                const formData = new FormData();
                formData.append('email', email);
                formData.append('image', imageFile);
                formData.append('prompt', motionText); 

                const res = await fetch(WORKER_URL, { method: 'POST', body: formData });
                const initData = await res.json();

                if (initData.id) pollForResult(initData.id);
                else throw new Error(initData.error || "Failed to start");
            } catch (err) {
                alert("Error: " + err.message);
                genBtn.disabled = false;
                statusDiv.classList.add('hidden');
            }
        });

        async function pollForResult(id) {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`${WORKER_URL}/result?id=${id}`);
                    if (res.status === 200) {
                        const blob = await res.blob();
                        const videoUrl = URL.createObjectURL(blob);
                        document.getElementById('outputVideo').src = videoUrl;
                        document.getElementById('downloadBtn').href = videoUrl;
                        clearInterval(interval);
                        statusDiv.classList.add('hidden');
                        videoContainer.classList.remove('hidden');
                        genBtn.disabled = false;
                        updateCredits();
                    } else if (res.status !== 202) {
                        clearInterval(interval);
                        alert("Processing failed.");
                        genBtn.disabled = false;
                    }
                } catch (e) { console.error("Polling..."); }
            }, 10000);
        }
    </script>
</body>
</html>
