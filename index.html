<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Magic</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --green: #238636; --red: #da3633; }
        body { font-family: sans-serif; background: var(--bg); color: #c9d1d9; display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--card); padding: 30px; border-radius: 12px; width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .badge { background: #1f6feb; padding: 6px 14px; border-radius: 20px; font-weight: bold; font-size: 0.85em; white-space: nowrap; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0 20px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--green); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #21262d; cursor: not-allowed; }
        #status { margin-top: 20px; text-align: center; font-size: 0.9em; }
        .debug-log { font-family: monospace; font-size: 0.75em; color: #8b949e; margin-top: 15px; padding: 10px; background: #010409; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="color:var(--blue); margin:0;">AI Video Magic</h2>
        <div id="credit-badge" class="badge">CREDITS: --</div>
    </div>

    <label>ACCOUNT EMAIL</label>
    <input type="email" id="email" placeholder="vijitkumar@gmail.com" oninput="fetchCredits()">

    <label>1. UPLOAD IMAGE</label>
    <input type="file" id="imageInput" accept="image/*">

    <label>2. MOTION INSTRUCTIONS</label>
    <textarea id="prompt" rows="2" placeholder="e.g. Mascot blinks and smiles"></textarea>

    <button id="genBtn" onclick="generateVideo()">Generate Video</button>

    <div id="status"></div>
    <div id="debug" class="debug-log"></div>
</div>

<script>
    // 1. UPDATE THIS URL TO YOUR ACTUAL WORKER URL
    const WORKER_URL = "https://your-worker-name.workers.dev"; 

    function logDebug(msg) {
        const d = document.getElementById('debug');
        d.style.display = "block";
        d.innerHTML += `> ${msg}<br>`;
    }

    async function fetchCredits() {
        const email = document.getElementById('email').value;
        const badge = document.getElementById('credit-badge');
        if (!email.includes('@')) return;

        try {
            const res = await fetch(`${WORKER_URL}?email=${encodeURIComponent(email)}`);
            const data = await res.json();
            
            // Handle if Supabase returns an empty array or no data
            const amount = (data && typeof data.total_credits !== 'undefined') ? data.total_credits : 0;
            badge.innerText = `CREDITS: ${amount}`;
            
            if(amount === 0) logDebug(`No record found for ${email} in Supabase.`);
        } catch (err) {
            badge.innerText = "CREDITS: Error";
            logDebug(`Fetch failed: ${err.message}`);
        }
    }

    async function generateVideo() {
        const email = document.getElementById('email').value;
        const image = document.getElementById('imageInput').files[0];
        const status = document.getElementById('status');
        const btn = document.getElementById('genBtn');

        if (!email || !image) return alert("Email and Image required!");

        btn.disabled = true;
        status.innerHTML = "Checking credits & sending to Stability AI...";
        
        const fd = new FormData();
        fd.append("email", email);
        fd.append("image", image);

        try {
            const res = await fetch(WORKER_URL, { method: "POST", body: fd });
            const result = await res.json();

            if (!res.ok) throw new Error(result.error + (result.details ? ": " + result.details : ""));

            status.innerHTML = "Cooking video... this takes ~60s.";
            pollForResult(result.id);
        } catch (err) {
            status.innerHTML = `<span style="color:var(--red)">Failed: ${err.message}</span>`;
            logDebug(`POST Error: ${err.message}`);
            btn.disabled = false;
        }
    }

    async function pollForResult(id) {
        const interval = setInterval(async () => {
            const res = await fetch(`${WORKER_URL}/result?id=${id}`);
            if (res.status === 202) return; // Still processing

            if (res.ok) {
                clearInterval(interval);
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                document.getElementById('status').innerHTML = `<video controls width="100%"><source src="${url}"></video>`;
                document.getElementById('genBtn').disabled = false;
                fetchCredits();
            }
        }, 10000);
    }
</script>
</body>
</html>
