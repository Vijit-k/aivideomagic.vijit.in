<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Magic</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --success-color: #238636;
            --error-color: #da3633;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h2 { color: var(--accent-color); margin: 0; }
        .credit-badge {
            background: #1f6feb;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85em; text-transform: uppercase; opacity: 0.8; }
        input[type="email"], input[type="file"], textarea {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--success-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:disabled { background-color: #21262d; cursor: not-allowed; }
        #status { margin-top: 20px; text-align: center; font-size: 0.9em; }
        .error-box { color: var(--error-color); padding: 10px; border: 1px solid var(--error-color); border-radius: 6px; margin-top: 10px; font-size: 0.8em; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <h2>AI Video Magic</h2>
        <div id="credit-count" class="credit-badge">CREDITS: --</div>
    </div>

    <div class="input-group">
        <label>Account Email</label>
        <input type="email" id="email" placeholder="Enter your email" onchange="fetchCredits()">
    </div>

    <div class="input-group">
        <label>1. Upload Image (Multiples of 64)</label>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div class="input-group">
        <label>2. Motion Instructions</label>
        <textarea id="prompt" rows="3" placeholder="e.g., mascot blinks and smiles"></textarea>
    </div>

    <button id="generateBtn" onclick="generateVideo()">Generate Video</button>

    <div id="status"></div>
    <div id="error-details"></div>
</div>

<script>
    const WORKER_URL = "https://your-worker-subdomain.workers.dev"; // Replace with your actual Worker URL

    async function fetchCredits() {
        const email = document.getElementById('email').value;
        if (!email) return;

        try {
            const response = await fetch(`${WORKER_URL}?email=${encodeURIComponent(email)}`);
            const data = await response.json();
            // FIXED: Explicitly handle cases where user is not in database
            document.getElementById('credit-count').innerText = `CREDITS: ${data.total_credits ?? 0}`;
        } catch (err) {
            document.getElementById('credit-count').innerText = "CREDITS: 0";
        }
    }

    async function generateVideo() {
        const email = document.getElementById('email').value;
        const imageFile = document.getElementById('imageInput').files[0];
        const statusDiv = document.getElementById('status');
        const errorDiv = document.getElementById('error-details');
        const btn = document.getElementById('generateBtn');

        if (!email || !imageFile) {
            alert("Please provide both email and an image.");
            return;
        }

        statusDiv.innerHTML = "Processing Magic...<br><small>STABILITY AI IS ANIMATING YOUR MASCOT...</small>";
        errorDiv.innerHTML = "";
        btn.disabled = true;

        const formData = new FormData();
        formData.append("email", email);
        formData.append("image", imageFile);

        try {
            const response = await fetch(WORKER_URL, {
                method: "POST",
                body: formData
            });

            const result = await response.json();

            if (!response.ok) {
                // FIXED: Better visibility for "Stability Refused" details
                throw new Error(result.error + (result.details ? ": " + result.details : ""));
            }

            if (result.id) {
                pollForResult(result.id);
            }
        } catch (err) {
            statusDiv.innerHTML = `<span style="color:#da3633">Error: Generation Failed</span>`;
            errorDiv.innerHTML = `<div class="error-box">${err.message}</div>`;
            btn.disabled = false;
        }
    }

    async function pollForResult(id) {
        const statusDiv = document.getElementById('status');
        
        const interval = setInterval(async () => {
            try {
                const res = await fetch(`${WORKER_URL}/result?id=${id}`);
                
                if (res.status === 202) {
                    statusDiv.innerHTML = "Still Cooking... (Usually takes 60-90 seconds)";
                    return;
                }

                if (res.ok) {
                    clearInterval(interval);
                    const videoBlob = await res.blob();
                    const videoUrl = URL.createObjectURL(videoBlob);
                    statusDiv.innerHTML = `
                        <video controls width="100%" style="border-radius:8px; margin-top:10px;">
                            <source src="${videoUrl}" type="video/mp4">
                        </video>
                        <br><a href="${videoUrl}" download="mascot.mp4" style="color:#58a6ff; text-decoration:none;">Download Video</a>
                    `;
                    document.getElementById('generateBtn').disabled = false;
                    fetchCredits(); // Refresh credits after successful generation
                }
            } catch (err) {
                clearInterval(interval);
                statusDiv.innerHTML = "Polling Error. Please check back later.";
            }
        }, 10000);
    }
</script>

</body>
</html>
